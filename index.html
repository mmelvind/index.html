<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Disaster Evaluation Wordle</title>
    <style>
        :root {
            --bg-color: #121213;
            --text-color: #ffffff;
            --empty-border: #3a3a3c;
            --filled-border: #565758;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --key-bg: #818384;
            --modal-bg: #1e1e1e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            height: 100vh;
            justify-content: space-between;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--empty-border);
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #clue-container {
            width: 90%;
            max-width: 600px;
            background-color: #2a2a2a;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            border-left: 5px solid var(--present);
            text-align: center;
            font-size: clamp(14px, 4vw, 16px);
            line-height: 1.4;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        #clue-label {
            font-weight: bold;
            color: var(--present);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
        }

        #board-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 10px;
            width: 100%;
            overflow: hidden;
        }

        #board {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            max-width: 600px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 4px;
            width: 100%;
        }

        .tile {
            /* Adjusted to safely fit up to 10+ letters across a mobile screen */
            width: clamp(22px, 8vw, 55px);
            height: clamp(24px, 8.5vw, 55px);
            border: 2px solid var(--empty-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(1rem, 5vw, 2rem);
            font-weight: bold;
            text-transform: uppercase;
        }

        .tile.active { border-color: var(--filled-border); }
        .tile.correct { background-color: var(--correct); border-color: var(--correct); }
        .tile.present { background-color: var(--present); border-color: var(--present); }
        .tile.absent { background-color: var(--absent); border-color: var(--absent); }

        #keyboard {
            width: 100%;
            max-width: 600px;
            padding: 5px 8px 15px 8px; /* Reduced edge padding */
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px; /* Reduced gap between keys */
            width: 100%;
        }

        .key {
            background-color: var(--key-bg);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            height: 50px; /* Use fixed height instead of heavy padding */
            padding: 0; /* Remove internal padding to prevent overflow */
            font-size: clamp(11px, 3.5vw, 14px);
            font-weight: bold;
            cursor: pointer;
            flex: 1; /* Automatically distribute width */
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            touch-action: manipulation; /* Prevents double-tap zoom on mobile */
        }

        .key.large { 
            flex: 1.5; 
            font-size: clamp(9px, 3vw, 12px); 
        }
        
        .key.correct { background-color: var(--correct); }
        .key.present { background-color: var(--present); }
        .key.absent { background-color: var(--absent); }

        /* Modal Styles */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--modal-bg);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            max-width: 90%;
            width: 320px;
        }

        .modal-content h2 { margin-top: 0; }
        
        #share-btn {
            background-color: var(--correct);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        #share-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <header>DISASTER EVALUATION</header>

    <div id="clue-container">
        <span id="clue-label">Evaluation Clue</span>
        <span id="clue-text"></span>
    </div>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="keyboard">
        <div class="keyboard-row">
            <button class="key" data-key="Q">Q</button>
            <button class="key" data-key="W">W</button>
            <button class="key" data-key="E">E</button>
            <button class="key" data-key="R">R</button>
            <button class="key" data-key="T">T</button>
            <button class="key" data-key="Y">Y</button>
            <button class="key" data-key="U">U</button>
            <button class="key" data-key="I">I</button>
            <button class="key" data-key="O">O</button>
            <button class="key" data-key="P">P</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="A">A</button>
            <button class="key" data-key="S">S</button>
            <button class="key" data-key="D">D</button>
            <button class="key" data-key="F">F</button>
            <button class="key" data-key="G">G</button>
            <button class="key" data-key="H">H</button>
            <button class="key" data-key="J">J</button>
            <button class="key" data-key="K">K</button>
            <button class="key" data-key="L">L</button>
        </div>
        <div class="keyboard-row">
            <button class="key large" data-key="ENTER">ENTER</button>
            <button class="key" data-key="Z">Z</button>
            <button class="key" data-key="X">X</button>
            <button class="key" data-key="C">C</button>
            <button class="key" data-key="V">V</button>
            <button class="key" data-key="B">B</button>
            <button class="key" data-key="N">N</button>
            <button class="key" data-key="M">M</button>
            <button class="key large" data-key="BACKSPACE">⌫</button>
        </div>
    </div>

    <!-- Results Modal -->
    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title">Assessment Complete</h2>
            <p id="modal-message"></p>
            <button id="share-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                Share Result
            </button>
        </div>
    </div>

    <script>
        // 15 Concepts extracted directly from the Disaster Management presentation
        const learningData = [
            { word: "DISASTER", clue: "A sudden, calamitous event causing large-scale destruction and outstripping community coping capacity." },
            { word: "NATURAL", clue: "One of the two main classifications of disasters, alongside man-made." },
            { word: "CYCLONE", clue: "A meteorological disaster characterized by inward spiraling winds." },
            { word: "TSUNAMI", clue: "A hydrological disaster involving massive, destructive ocean waves." },
            { word: "DROUGHT", clue: "A climatological disaster involving prolonged periods of low precipitation." },
            { word: "BIOLOGICAL", clue: "Type of hazard involving exposure to germs, toxins, epidemics, and pandemics." },
            { word: "NATIONAL", clue: "A disaster scale paralyzing a whole country." },
            { word: "CASUALTY", clue: "A Mass ________ Incident generates more patients than local resources can manage." },
            { word: "RECOVERY", clue: "In catastrophic scenarios, this depends entirely on the rapid infusion of state or international aid." },
            { word: "LOCAL", clue: "The scale of a disaster affecting a specific neighborhood or community." },
            { word: "ARSON", clue: "A sociological hazard involving the criminal act of deliberately setting fire to property." },
            { word: "GLOBAL", clue: "The scale of a disaster that affects multiple countries or the entire planet." },
            { word: "TOXINS", clue: "Biological hazards include exposure to germs and _______." },
            { word: "EARTHQUAKE", clue: "A geophysical event measured by the moment magnitude scale." },
            { word: "MANMADE", clue: "Disasters resulting from technological failures, hazardous materials, or sociological hazards." }
        ];
        
        // Select a random object on load
        const selectedQuestion = learningData[Math.floor(Math.random() * learningData.length)];
        const targetWord = selectedQuestion.word;
        const targetClue = selectedQuestion.clue;
        
        const numGuesses = 6;
        const wordLength = targetWord.length; // Dynamic length assignment
        
        let guesses = Array.from({ length: numGuesses }, () => "");
        let currentGuessIndex = 0;
        let gameOver = false;
        let gameWon = false;

        // Inject Clue
        document.getElementById("clue-text").innerText = targetClue;

        const board = document.getElementById("board");

        // Initialize Dynamic Board
        for (let i = 0; i < numGuesses; i++) {
            const row = document.createElement("div");
            row.className = "row";
            for (let j = 0; j < wordLength; j++) {
                const tile = document.createElement("div");
                tile.className = "tile";
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            board.appendChild(row);
        }

        // Update UI
        function updateBoard() {
            for (let i = 0; i < numGuesses; i++) {
                for (let j = 0; j < wordLength; j++) {
                    const tile = document.getElementById(`tile-${i}-${j}`);
                    tile.textContent = guesses[i][j] || "";
                    if (guesses[i][j]) {
                        tile.classList.add("active");
                    } else {
                        tile.classList.remove("active");
                    }
                }
            }
        }

        function handleInput(key) {
            if (gameOver) return;

            const currentGuess = guesses[currentGuessIndex];

            if (key === "ENTER") {
                if (currentGuess.length === wordLength) {
                    checkGuess();
                } else {
                    alert(`Not enough letters. Word is ${wordLength} letters long.`);
                }
            } else if (key === "BACKSPACE") {
                guesses[currentGuessIndex] = currentGuess.slice(0, -1);
            } else if (/^[A-Z]$/.test(key) && currentGuess.length < wordLength) {
                guesses[currentGuessIndex] += key;
            }
            updateBoard();
        }

        function checkGuess() {
            const guess = guesses[currentGuessIndex];
            const targetArray = targetWord.split("");
            const guessArray = guess.split("");
            const tileColors = Array(wordLength).fill("absent");

            // First pass: find exact matches (Green)
            for (let i = 0; i < wordLength; i++) {
                if (guessArray[i] === targetArray[i]) {
                    tileColors[i] = "correct";
                    targetArray[i] = null; 
                }
            }

            // Second pass: find present but wrong location (Yellow)
            for (let i = 0; i < wordLength; i++) {
                if (tileColors[i] !== "correct" && targetArray.includes(guessArray[i])) {
                    tileColors[i] = "present";
                    targetArray[targetArray.indexOf(guessArray[i])] = null;
                }
            }

            // Apply styles to tiles and keyboard
            for (let i = 0; i < wordLength; i++) {
                const tile = document.getElementById(`tile-${currentGuessIndex}-${i}`);
                tile.classList.add(tileColors[i]);
                
                const keyBtn = document.querySelector(`.key[data-key="${guessArray[i]}"]`);
                if (keyBtn) {
                    if (tileColors[i] === 'correct' || (tileColors[i] === 'present' && !keyBtn.classList.contains('correct'))) {
                        keyBtn.classList.remove('present', 'absent');
                        keyBtn.classList.add(tileColors[i]);
                    } else if (tileColors[i] === 'absent' && !keyBtn.classList.contains('correct') && !keyBtn.classList.contains('present')) {
                        keyBtn.classList.add('absent');
                    }
                }
            }

            if (guess === targetWord) {
                gameWon = true;
                gameOver = true;
                setTimeout(() => showModal("Correct!", `Excellent work analyzing the clue.`), 500);
            } else if (currentGuessIndex === numGuesses - 1) {
                gameOver = true;
                setTimeout(() => showModal("Assessment Complete", `The correct answer was ${targetWord}`), 500);
            } else {
                currentGuessIndex++;
            }
        }

        // Show Modal and Share Logic
        function showModal(title, message) {
            document.getElementById("modal-title").innerText = title;
            document.getElementById("modal-message").innerText = message;
            document.getElementById("modal").style.display = "flex";
        }

        document.getElementById("share-btn").addEventListener("click", () => {
            const attemptCount = gameWon ? currentGuessIndex + 1 : 'X';
            let shareText = `Disaster Evaluation ${attemptCount}/6\n\n`;
            
            const rowsToShare = gameWon ? currentGuessIndex + 1 : numGuesses;
            
            for (let i = 0; i < rowsToShare; i++) {
                let rowString = "";
                for (let j = 0; j < wordLength; j++) {
                    const tile = document.getElementById(`tile-${i}-${j}`);
                    if (tile.classList.contains("correct")) rowString += "🟩";
                    else if (tile.classList.contains("present")) rowString += "🟨";
                    else rowString += "⬛";
                }
                shareText += rowString + "\n";
            }

            if (navigator.clipboard) {
                navigator.clipboard.writeText(shareText).then(() => {
                    const btn = document.getElementById("share-btn");
                    const originalText = btn.innerHTML;
                    btn.innerText = "Copied to Clipboard!";
                    setTimeout(() => { btn.innerHTML = originalText; }, 2000);
                }).catch(err => {
                    alert("Copy this text manually:\n\n" + shareText);
                });
            } else {
                alert("Copy this text manually:\n\n" + shareText);
            }
        });

        // Event Listeners
        document.querySelectorAll(".key").forEach(button => {
            button.addEventListener("click", () => {
                handleInput(button.dataset.key);
            });
        });

        document.addEventListener("keydown", (e) => {
            let key = e.key.toUpperCase();
            if (e.key === "Enter") key = "ENTER";
            if (e.key === "Backspace") key = "BACKSPACE";
            handleInput(key);
        });
    </script>
</body>
</html>
